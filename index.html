<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>心镜 · 心安之处</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;background:#F5F0EB;color:#3D3A38;-webkit-font-smoothing:antialiased;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto;background:#F5F0EB;position:relative}
.header{padding:20px 24px 12px;text-align:center;flex-shrink:0;position:relative}
.header-title{font-size:22px;font-weight:500;color:#5B7B6F;letter-spacing:4px}
.header-title span{color:#C4956A}
.header-sub{font-size:13px;color:#9B8E82;margin-top:4px;font-weight:400}
.chat-area{flex:1;overflow-y:auto;padding:8px 20px 0;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:#DDD5CD;border-radius:4px}
.msg{margin-bottom:16px;animation:msgIn .35s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-row{display:flex;align-items:flex-start;gap:10px}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.msg-avatar.ai{background:#E8F0EC;color:#5B7B6F}
.msg-avatar.user{background:#F5EDE4;color:#C4956A}
.msg-bubble{max-width:82%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7;word-break:break-word}
.msg-bubble.ai{background:#FFFBF7;border:1px solid #EDE5DD;color:#3D3A38;border-bottom-left-radius:4px}
.msg-bubble.user{background:#5B7B6F;color:#FFF;margin-left:auto;border-bottom-right-radius:4px}
.msg-bubble.ai .typing{display:inline-block;animation:blink 1.2s step-end infinite}
@keyframes blink{50%{opacity:0}}
.sys-msg{text-align:center;margin:16px 0;font-size:13px;color:#B0A59B;line-height:1.6}
.sys-msg .icon{font-size:18px;display:block;margin-bottom:6px}
.input-area{padding:12px 20px 16px;background:#F5F0EB;flex-shrink:0;border-top:1px solid #EDE5DD}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{flex:1;border:1px solid #DDD5CD;border-radius:12px;background:#FFFBF7;padding:10px 14px;resize:none;font-size:14px;line-height:1.5;color:#3D3A38;outline:none;max-height:120px;min-height:44px;transition:border-color .2s;font-family:inherit}
.input-box:focus{border-color:#C4956A}
.input-box::placeholder{color:#BFB5AB}
.send-btn{width:44px;height:44px;border:none;border-radius:50%;background:#5B7B6F;color:white;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s}
.send-btn:hover{background:#4A6A5E}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{background:#C8C0B8;cursor:not-allowed}
.input-hint{font-size:11px;color:#BFB5AB;margin-top:6px;text-align:center}
.privacy-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(245,240,235,0.95);display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity .4s}
.privacy-overlay.hidden{opacity:0;pointer-events:none}
.privacy-card{background:#FFFBF7;border:1px solid #EDE5DD;border-radius:16px;padding:32px 28px;max-width:400px;width:90%;text-align:center}
.privacy-card h2{font-size:20px;font-weight:500;color:#5B7B6F;margin-bottom:4px}
.privacy-card .sub{color:#C4956A;font-size:14px;margin-bottom:16px}
.privacy-card p{font-size:13px;color:#7A6E64;line-height:1.7;margin-bottom:10px}
.privacy-card .begin-btn{margin-top:16px;padding:12px 40px;border:none;border-radius:10px;background:#5B7B6F;color:white;font-size:16px;font-weight:500;cursor:pointer;transition:background .2s}
.privacy-card .begin-btn:hover{background:#4A6A5E}
@media(max-width:500px){
.header{padding:16px 16px 8px}
.header-title{font-size:18px}
.chat-area{padding:4px 12px 0}
.input-area{padding:8px 12px 12px}
.msg-bubble{max-width:88%}
}
</style>
</head>
<body>
<div class="app" id="app">
<div class="privacy-overlay" id="privacyOverlay">
<div class="privacy-card">
<h2>心镜</h2>
<div class="sub">心安之处，即是归处</div>
<p>欢迎来到心镜。这里是一个安全的空间，你可以聊聊你的困惑、迷茫，或只是随意说说心里话。</p>
<p>所有对话仅保存在你的浏览器本地，不会上传到任何服务器。</p>
<p style="font-size:12px;color:#B0A59B;">心镜不是心理医生，不能替代专业治疗。</p>
<button class="begin-btn" onclick="startApp()">开启对话</button>
<div class="info-note">点击即表示开始</div>
</div>
</div>
<div class="header">
<div class="header-title">心<span>镜</span></div>
<div class="header-sub">心安之处，即是归处</div>
</div>
<div class="chat-area" id="chatArea"></div>
<div class="input-area">
<div class="input-row">
<textarea class="input-box" id="inputBox" rows="1" placeholder="说点什么吧…" onkeydown="handleKey(event)"></textarea>
<button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
</div>
<div class="input-hint">心镜 · 你的专属对话空间</div>
</div>
</div>
<script>
const SYSTEM_PROMPT = `你叫"心镜"，是一个轻松、温暖、治愈的对话伙伴。
== 核心人设 ==
- 风格：轻松治愈系。语气温柔、平和、包容，像一位年长但亲切的朋友。
- 永远不要急于给出结论，先倾听，先理解。
- 不说"你的命运是……"，而说"从你的格局来看，这可能是一个方向"
- 不制造焦虑，不说恐吓性语言
- 每句话都让对方感觉被理解和接纳
== 三阶服务流程 ==
第一阶段：聊天沟通（必须先做）
  1. 建立信任和安全感
  2. 倾听真实困扰——用开放式问题引导
  3. 情绪容器——先接纳，不急于分析
  4. 明确需求——"你希望我帮你看到什么程度？"
  5. 在对方给出明确请求前，绝不主动发起排盘
第二阶段：命理分析（仅当对方明确请求时）
  6. 获得信息后，用专业工具分析
  7. 分析时用"你的格局显示……"而非"你的命是……"
第三阶段：行动建议
  8. 给出可执行的具体建议
  9. 明确说"这个建议供你参考"
== 伦理红线 ==
- 不诊断、不处方、不替代心理治疗
- 发现自伤/自杀言语→建议联系心理热线
- 不承诺具体结果
- 命理是了解自己的工具，不是预测未来的枷锁
== 输出规范 ==
- 使用简体中文
- 轻松温柔的语气，但内容要有实质
- 不过度使用emoji`;

const state={
  apiUrl: '/api/chat',
  model:'MiniMax-M3',
  messages:[{role:'system',content:SYSTEM_PROMPT}],
  isSending:false,
  hasStarted:false
};

const chatArea=document.getElementById('chatArea'),inputBox=document.getElementById('inputBox'),sendBtn=document.getElementById('sendBtn');

function init(){sendBtn.disabled=false;inputBox.placeholder='说点什么吧…'}

function startApp(){
  document.getElementById('privacyOverlay').classList.add('hidden');
  state.hasStarted=true;init();
  addSystemMessage('\u{1F4AC}','你好，我是心镜。随意聊聊，或者说说你最近在想什么——都可以。');
  setTimeout(()=>{
    addSystemMessage('\u{1F33F}','你可以试试问我：<br>\u2022 "帮我看看我的八字"<br>\u2022 "最近工作不顺"<br>\u2022 "心里有点乱，想聊聊"<br>\u2022 随便说三个数字起一卦');
  },600);
}

function addMessage(c,r){
  const d=document.createElement('div');d.className='msg';
  d.innerHTML=`<div class="msg-row" style="${r==='user'?'flex-direction:row-reverse':''}"><div class="msg-avatar ${r}">${r==='ai'?'\u{1FAB7}':'\u{1F33F}'}</div><div class="msg-bubble ${r}">${c}</div></div>`;
  chatArea.appendChild(d);scrollToBottom();return d;
}

function addSystemMessage(i,t){
  const d=document.createElement('div');d.className='sys-msg';
  d.innerHTML=`<span class="icon">${i}</span>${t}`;
  chatArea.appendChild(d);scrollToBottom();
}

function showTyping(){
  const d=document.createElement('div');d.className='msg';d.id='typingIndicator';
  d.innerHTML='<div class="msg-row"><div class="msg-avatar ai">\u{1FAB7}</div><div class="msg-bubble ai"><span class="typing">\u00B7</span><span class="typing">\u00B7</span><span class="typing">\u00B7</span></div></div>';
  chatArea.appendChild(d);scrollToBottom();
}

function removeTyping(){const e=document.getElementById('typingIndicator');if(e)e.remove()}

function scrollToBottom(){setTimeout(()=>{chatArea.scrollTop=chatArea.scrollHeight},50)}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}autoResize(e.target)}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}

function renderMarkdown(text){
  let h=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');

  h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/^---$/gm,'<hr>');
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h=h.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');
  h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  h=h.replace(/\n\n/g,'</p><p>');
  h=h.replace(/\n/g,'<br>');
  return '<p>'+h+'</p>';
}

async function sendMessage(){
  const t=inputBox.value.trim();
  if(!t||state.isSending)return;
  inputBox.value='';autoResize(inputBox);
  addMessage(t,'user');
  state.messages.push({role:'user',content:t});
  showTyping();state.isSending=true;sendBtn.disabled=true;inputBox.disabled=true;
  try{
    const body={
      model:state.model,
      messages:state.messages,
      temperature:0.7,
      max_tokens:4096,
      stream:false
    };
    const resp=await fetch(state.apiUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!resp.ok){const e=await resp.text();throw new Error('API错误('+resp.status+'):'+e)}
    const data=await resp.json();
    let reply=data.choices?.[0]?.message?.content||'';
    reply=reply.replace(/<think>[\s\S]*?<\/think>/g,'').trim();
    if(!reply)reply='抱歉，我没有得到回答。';
    removeTyping();addMessage(renderMarkdown(reply),'ai');
    state.messages.push({role:'assistant',content:reply});
    if(state.messages.length>41){
      state.messages=[state.messages[0],...state.messages.slice(-40)]
    }
  }catch(err){removeTyping();addSystemMessage('\u26A0\uFE0F','出了点问题：'+err.message)}
  finally{state.isSending=false;sendBtn.disabled=false;inputBox.disabled=false;inputBox.focus()}
}
</script>
</body>
</html>
